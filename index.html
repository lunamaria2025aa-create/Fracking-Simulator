<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Fracking</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #game-container { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Simulador de Fracking</h1>
        <p id="stats">Trimestre: 1 | Riesgo: 0 | Social: 100</p>
        
        <input type="number" id="tecnologia" placeholder="Tecnología (T)">
        <input type="number" id="monitoreo" placeholder="Monitoreo (S)">
        <input type="number" id="comunidad" placeholder="Comunidad (C)">
        <input type="number" id="produccion" placeholder="Producción (P)">
        
        <button onclick="ejecutarTurno()">Ejecutar Turno</button>
        
        <p id="mensaje"></p>
    </div>

    <script>
        let riesgo = 0;
        let social = 100;
        let trimestre = 1;

        function ejecutarTurno() {
            let t = parseInt(document.getElementById('tecnologia').value) || 0;
            let s = parseInt(document.getElementById('monitoreo').value) || 0;
            let c = parseInt(document.getElementById('comunidad').value) || 0;
            let p = parseInt(document.getElementById('produccion').value) || 0;

            // Lógica básica
            riesgo += (p * 0.8) - (t * 0.5) - (s * 0.5);
            social += (c * 0.5) - (riesgo * 0.2);
            trimestre++;

            document.getElementById('stats').innerText = `Trimestre: ${trimestre} | Riesgo: ${riesgo.toFixed(1)} | Social: ${social.toFixed(1)}`;
            document.getElementById('mensaje').innerText = "Turno procesado.";
        }
    </script>
</body>
</html>
